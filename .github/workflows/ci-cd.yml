name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-20-
      - run: npm install
      - id: detect_lint
        shell: bash
        run: |
          HAS_LINT=$(node -e "const p=require('./package.json'); console.log(Boolean(p.scripts && p.scripts.lint))")
          echo "hasLint=${HAS_LINT}" >> "$GITHUB_OUTPUT"
      - if: ${{ steps.detect_lint.outputs.hasLint == 'true' }}
        run: npm run lint
      - run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-20-
      - run: npm install
      - id: detect_lint
        run: |
          node -e "const p=require('./package.json'); const has=Boolean(p.scripts&&p.scripts.lint); require('fs').appendFileSync(process.env.GITHUB_OUTPUT, `hasLint=${has}\n`)"
      - if: steps.detect_lint.outputs.hasLint == 'true'
        run: npm run lint
      - run: npm run test:run
      - uses: microsoft/playwright-github-action@v1
      - run: npx playwright install --with-deps
      - run: npm run test:e2e
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist